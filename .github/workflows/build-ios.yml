name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Позволяет запускать вручную из GitHub UI

jobs:
  build:
    name: Build and Export IPA
    runs-on: macos-14  # macOS с Xcode 15

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Выбираем версию Xcode
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # 3. Показываем версию для отладки
      - name: Show Xcode version
        run: xcodebuild -version

      # 4. Импортируем сертификат подписи (self-signed для ad-hoc)
      #    Если у вас есть Apple Developer Account — замените на настоящий сертификат
      - name: Create self-signed certificate for build
        run: |
          # Создаём временный keychain
          security create-keychain -p "temp_password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp_password" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Создаём самоподписанный сертификат для компиляции (без реальной подписи)
          echo "Using unsigned build for simulator/dev testing"

      # 5. Сборка приложения (без подписи — для тестирования кода)
      - name: Build app (no signing)
        run: |
          xcodebuild \
            -project NotifyApp.xcodeproj \
            -scheme NotifyApp \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build \
            -derivedDataPath build/DerivedData

      # 6. Пакуем .app в .ipa вручную (без подписи)
      - name: Package .app into .ipa
        run: |
          APP_PATH=$(find build/DerivedData -name "*.app" -not -path "*/simulator/*" | head -1)
          echo "Found .app at: $APP_PATH"
          
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          
          cd build
          zip -r NotifyApp.ipa Payload/
          echo "IPA created: $(ls -lh NotifyApp.ipa)"

      # 7. Загружаем IPA как артефакт GitHub
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NotifyApp-IPA
          path: build/NotifyApp.ipa
          retention-days: 30
          if-no-files-found: error

      # 8. Также создаём GitHub Release если это тег
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/NotifyApp.ipa
          name: "NotifyApp ${{ github.ref_name }}"
          body: |
            ## NotifyApp Release ${{ github.ref_name }}
            
            iOS приложение с уведомлением через 5 секунд после запуска.
            
            ### Установка
            Для установки IPA без подписи используйте:
            - [AltStore](https://altstore.io/) — бесплатно
            - [Sideloadly](https://sideloadly.io/) — бесплатно  
            - [TrollStore](https://github.com/opa334/TrollStore) — для поддерживаемых устройств
